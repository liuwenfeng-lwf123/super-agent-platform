<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Counter App</n>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .counter-container {
            background-color: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        .count-display {
            font-size: 48px;
            margin: 20px 0;
            color: #333;
        }

        .button-group {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #ddd;
        }

        .increase {
            background-color: #4CAF50;
            color: white;
        }

        .decrease {
            background-color: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <div class="counter-container">
        <h1>Simple Counter</h1>
        <div class="count-display" id="count">0</div>
        <div class="button-group">
            <button class="decrease" onclick="decrease()">Decrease</button>
            <button class="increase" onclick="increase()">Increase</button>
        </div>
    </div>

    <script>
        let count = 0;

        function updateDisplay() {
            document.getElementById('count').textContent = count;
        }

        function increase() {
            count++;
            updateDisplay();
        }

        function decrease() {
            count--;
            updateDisplay();
        }
    </script>
</body>
</html>
